name: shopease
description: "A gamified Flutter e-commerce app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  get_it: ^9.2.1
  flutter_screenutil: ^5.9.3
  go_router: ^14.8.1
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  google_sign_in: ^6.3.0
  flutter_animate: ^4.5.2
  confetti: ^0.8.0
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  dartz: ^0.10.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
